name: AI Email Assistant

on:
  schedule:
    - cron: '0 12 * * *'   #  7:00 AM ET (UTC-5)
    - cron: '0 17 * * *'   # 12:00 PM ET
    - cron: '0 22 * * *'   #  5:00 PM ET
    - cron: '0 1  * * *'   #  8:00 PM ET
  workflow_dispatch:
    inputs:
      max_emails:
        description: 'Maximum number of emails to process (default: 10)'
        required: false
        default: '10'
      dry_run:
        description: 'Dry run — analyze emails but do not create drafts'
        required: false
        default: 'false'
        type: boolean

jobs:
  process-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Email Assistant
        env:
          # --- Gmail (required) ---
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}

          # --- Anthropic / Claude (required) ---
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # --- Notion (optional) ---
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PAGE_IDS: ${{ secrets.NOTION_PAGE_IDS }}

          # --- HubSpot (optional) ---
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}

          # --- Gong (optional) ---
          GONG_BASE_URL: ${{ secrets.GONG_BASE_URL }}
          GONG_ACCESS_KEY: ${{ secrets.GONG_ACCESS_KEY }}
          GONG_ACCESS_SECRET: ${{ secrets.GONG_ACCESS_SECRET }}

          # --- Ashby ATS (optional) ---
          ASHBY_API_KEY: ${{ secrets.ASHBY_API_KEY }}

          # --- Google Calendar (optional) ---
          # Set the repository variable GOOGLE_CALENDAR_ENABLED=true to activate.
          # The GMAIL_REFRESH_TOKEN must be re-authorised with calendar.readonly scope.
          GOOGLE_CALENDAR_ENABLED: ${{ vars.GOOGLE_CALENDAR_ENABLED || 'false' }}

          # --- Behaviour ---
          MAX_EMAILS: ${{ github.event.inputs.max_emails || '10' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python src/main.py
